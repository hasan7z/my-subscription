name: Config Rotation (Every 3 Hours)

on:
  schedule:
    - cron: "30 */3 * * *"  # هر ۳ ساعت، در دقیقه ۳۰
  workflow_dispatch:

jobs:
  rotate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Run Rotation Manager
        run: python -m Core.rotation_manager

      - name: Generate JoJo Style (30 Golden Configs)
        run: python -m Core.jojo_style

      - name: Commit and Push Rotated File
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # ۱. اضافه کردن همه تغییرات (شامل jojo_style.txt)
          git add -A
          
          # ۲. کامیت کردن (اگر تغییری نبود، ارور ندهد)
          git commit -m "🔄 Rotation + JoJo Update at $(date +%H:%M)" || echo "No changes to commit"
          
          # ۳. دریافت تغییرات جدید با مدیریت خودکار استش
          git pull --rebase --autostash origin main || echo "Pull skipped or minor conflict resolved"
          
          # ۴. پوش کردن نهایی
          git push origin main
