name: Unified Smart Update (Every 3 Hours)

on:
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch:

jobs:
  all_in_one:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: 1. Merge & Optimize Database
        run: python merge.py

      - name: 2. Generate Smart Best Files
        run: python -m Core.smart_best

      - name: 3. Generate JoJo Style (30 Golden Configs)
        run: python -m Core.jojo_style

      - name: 4. Run Rotation Manager
        run: python -m Core.rotation_manager

      - name: 5. Send Telegram Notification
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m Core.notifier

      - name: Commit and Push All Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "🔄 Unified 3-Hour Update $(date +%H:%M)" || echo "No changes"
          git pull --rebase --autostash origin main || echo "Pull skipped"
          git push origin main
