name: Fast Country-Boosted Update

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: 1. Run merge.py (Gather & Dedup)
        run: python merge.py

      - name: 2. Run Smart Best Generator (Country-Boosted ONLY)
        run: python -m Core.smart_best

      - name: 3. PROOF & STATS
        run: |
          echo "========================================="
          echo "📊 Standard Files (Country-Boosted):"
          wc -l output/Best*.txt || echo "No standard files"
          echo "========================================="
          echo "👑 Premium File (best_i.txt - Top 100):"
          wc -l output/best_i.txt || echo "No premium file"
          echo "========================================="

      - name: 4. Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "🔄 Country-Boosted Update (No GitHub Ping): $(date +%H:%M:%S)" || echo "No changes"
          git pull --rebase origin main
          git push
