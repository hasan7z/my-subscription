name: Hybrid Smart Update

on:
  workflow_dispatch: # این خط دکمه Run workflow را می‌سازد
  push:
    branches: [ main ] # این خط باعث می‌شود با هر تغییر خودکار اجرا شود

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install Requests
        run: pip install requests

      - name: 1. Run merge.py
        run: python merge.py

      - name: 2. Run Fast Health Checker
        run: python -m Core.health_checker

      - name: 3. Run Smart Best Generator
        run: python -m Core.smart_best

      - name: 4. Run Premium Health Checker (best_i.txt)
        run: python -m Core.premium_checker

      - name: 5. PROOF & STATS
        run: |
          echo "========================================="
          echo "📊 Standard Files:"
          wc -l output/Best*.txt || echo "No standard files"
          echo "========================================="
          echo "👑 Premium File (best_i.txt):"
          wc -l output/best_i.txt || echo "No premium file"
          echo "========================================="

      - name: 6. Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "🔄 Hybrid Update: $(date +%H:%M:%S)" || echo "No changes"
          git pull --rebase origin main
          git push
