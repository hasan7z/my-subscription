name: Hybrid Smart Update

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install Requests
        run: pip install requests

      - name: 1. Run merge.py (Gather & Dedup)
        run: python merge.py

      - name: 2. Run Fast Health Checker (Update DB with GitHub TCP Ping)
        run: python -m Core.health_checker

      - name: 3. Run Smart Best Generator (Country Boost + API for best_i.txt)
        run: python -m Core.smart_best

      - name: 4. PROOF & STATS
        run: |
          echo "========================================="
          echo "📊 Standard Files (GitHub Ping + Country):"
          wc -l output/Best*.txt || echo "No standard files"
          echo "========================================="
          echo "👑 Premium File (best_i.txt - API + Country):"
          wc -l output/best_i.txt || echo "No premium file"
          echo "========================================="

      - name: 5. Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "🔄 Hybrid Update: Country Boost + API for best_i: $(date +%H:%M:%S)" || echo "No changes"
          git pull --rebase origin main
          git push
